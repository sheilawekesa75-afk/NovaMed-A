services:
  - type: web
    name: novamed-backend
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # ── Set these in the Render dashboard (Environment tab) ──────────
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: admin@novamed.local
      - key: ADMIN_NAME
        value: System Administrator
      - key: ADMIN_PASSWORD
        sync: false
      - key: OTP_VISIBLE
        value: "false"
      - key: OTP_TTL_MIN
        value: "10"
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: novamed-db
    databaseName: novamed
    user: novamed
    plan: free
